name: Daily Drumbeat V2 - Live All - FIXED
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install feedparser requests
      - name: Build fresh issue - LIVE FRED + Finnhub + CoinGecko
        run: python generate_issue.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      - name: Deploy to Netlify - Live
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: '.'
          production-deploy: true
          deploy-message: "Daily ${{ github.run_number }} - Live mortgage + Black stocks"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
